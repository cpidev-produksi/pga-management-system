services:

  # PHP-FPM (Laravel App)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pga_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - pga_network
    depends_on:
      - mysql

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: pga_nginx
    restart: unless-stopped
    # ports:
    #   - "8080:80"
    expose:
      - "80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pga_network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: pga_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pga_management
      MYSQL_ROOT_PASSWORD: cpiproduksi1
      MYSQL_PASSWORD: cpiproduksi1
      MYSQL_USER: admin
    ports:
      - "3307:3306"
    volumes:
      - pga_mysql_data:/var/lib/mysql
    networks:
      - pga_network

networks:
  pga_network:
    driver: bridge

volumes:
  pga_mysql_data:
    driver: local